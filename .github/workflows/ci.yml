name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest

      - name: Run unittest (lekce 39)
        run: python -m pytest 39_testovani.py -v

      - name: Syntax check – všechny lekce
        run: |
          for f in [0-9][0-9]_*.py; do
            python3 -m py_compile "$f" && echo "OK: $f"
          done

      - name: Generuj web
        run: python3 34_generator_webu.py
